# 프로덕션용 docker-compose.yml
# 로컬 서버 배포 시 사용

version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag_chatbot_postgres
    environment:
      POSTGRES_DB: rag_chatbot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!kdh032500}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # 호스트 포트 5433 -> 컨테이너 포트 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_chatbot_backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-!kdh032500}@postgres:5432/rag_chatbot_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # 모델 파일 마운트 (필요시)
      - ./backend/models:/app/models:ro

volumes:
  postgres_data:

