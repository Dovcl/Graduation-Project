<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>시각화 - 환경 데이터 RAG 챗봇</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="board.css?v=2">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 좌측 사이드바 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="사이드바 토글">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <img src="assets/이루매캐릭터_46.png" alt="이루매" class="irumae-img">
            </div>

            <div class="sidebar-content">
                <button class="sidebar-btn" id="chatBtn" title="채팅">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="sidebar-btn-text">채팅</span>
                </button>

                <button class="sidebar-btn visualization-btn active" id="visualizationBtn" title="시각화">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <span class="sidebar-btn-text">시각화</span>
                </button>

                <button class="sidebar-btn board-btn" id="boardBtn" title="게시판">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 7h16M4 12h16M4 17h16"></path>
                    </svg>
                    <span class="sidebar-btn-text">게시판</span>
                </button>

                <div class="history-divider">
                    <span class="history-divider-label">대화 기록</span>
                </div>
                <div class="chat-history-list" id="chatHistoryList"></div>
            </div>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <div class="main-content">
            <!-- 헤더 -->
            <header class="header">
                <div class="header-content">
                    <div class="header-left-group">
                        <div class="header-logo">
                            <img src="assets/uos-logo-white.png" alt="서울시립대학교" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <div class="logo-placeholder" style="display: none;">UOS</div>
                        </div>
                    </div>
                    
                    <div class="header-center">
                        <h1>시각화</h1>
                    </div>
                    
                    <div class="header-right"></div>
                </div>
            </header>

            <!-- 시각화 영역 -->
            <main class="visualization-container">
                <!-- 탭 메뉴 -->
                <div class="viz-tabs">
                    <button class="viz-tab active" data-tab="map" id="mapTab">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        지도
                    </button>
                    <button class="viz-tab" data-tab="timeseries" id="timeseriesTab">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 6 13.5 15.5 8.5 10.5 2 17"></polyline>
                            <polyline points="16 6 22 6 22 12"></polyline>
                        </svg>
                        시계열
                    </button>
                    <button class="viz-tab" data-tab="plot" id="plotTab">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                        </svg>
                        상세 플롯
                    </button>
                </div>

                <!-- 탭 컨텐츠 -->
                <div class="viz-content">
                    <!-- 지도 탭 (A안 - 메인) -->
                    <div class="viz-panel active" id="mapPanel">
                        <div class="viz-header">
                            <h2 id="mapTitle">녹조 예측 지도</h2>
                            <div class="viz-info" id="mapInfo">
                                <span id="mapLocation">-</span>
                                <span id="mapDate">-</span>
                            </div>
                        </div>
                        <div class="map-description" id="mapDescription" style="margin-bottom: 1rem; padding: 0.75rem; background: #f5f5f5; border-radius: 0.5rem; font-size: 0.875rem; color: #666;">
                            <strong>지도 설명:</strong> 회색 영역은 유역 경계선, 파란 선은 하천망을 나타냅니다. 
                            <span id="mapPointDescription">원형 마커는 관측 지점의 위치를 나타냅니다.</span>
                        </div>
                        <div id="mapContainer" class="map-container"></div>
                        <!-- 컬러바 (범례) -->
                        <div class="colorbar-legend" id="colorbarLegend"></div>
                    </div>

                    <!-- 시계열 탭 -->
                    <div class="viz-panel" id="timeseriesPanel">
                        <div class="viz-header">
                            <h2 id="timeseriesTitle">시계열 차트</h2>
                            <div class="viz-info" id="timeseriesInfo">
                                <span id="timeseriesLocation">-</span>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="timeseriesChart"></canvas>
                        </div>
                    </div>

                    <!-- 상세 플롯 탭 (B안 - Plotly) -->
                    <div class="viz-panel" id="plotPanel">
                        <div class="viz-header">
                            <h2 id="plotTitle">상세 플롯</h2>
                            <div class="viz-info" id="plotInfo">
                                <span id="plotLocation">-</span>
                            </div>
                        </div>
                        <div id="plotContainer" class="plot-container"></div>
                        <div class="plot-actions" style="margin-top: 1rem; text-align: right;">
                            <button id="downloadPngBtn" class="download-btn" style="padding: 0.5rem 1rem; background: var(--uos-blue); color: white; border: none; border-radius: 0.25rem; cursor: pointer;">
                                📥 PNG 다운로드
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 데이터 없음 메시지 -->
                <div class="no-data-message" id="noDataMessage" style="display: none;">
                    <p>시각화할 데이터가 없습니다.</p>
                    <p>채팅에서 녹조 예측을 먼저 수행해주세요.</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Plotly (최신 버전) -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    
    <!-- 스크립트 (캐시 방지: 수정 시 v 값 올리기) -->
    <script src="config.js"></script>
    <script src="visualization.js?v=5"></script>
</body>
</html>
